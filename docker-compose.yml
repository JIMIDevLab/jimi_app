name: jimi-app

# Local dev runtime for the Expo Web bundle: a single container that
# builds the static bundle and serves it with an internal nginx.
#
# Bring it up:
#   cp .env.example .env       # set EXPO_PUBLIC_API_URL
#   docker compose up --build

services:
  app:
    build:
      context: .
      args:
        EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-http://localhost:8080}
    container_name: jimi-app
    ports:
      - "${APP_PORT:-8101}:80"
