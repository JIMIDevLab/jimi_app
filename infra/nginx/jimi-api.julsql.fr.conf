# JIMI API — public reverse-proxy. Used by the web frontend AND the future
# iOS / Android apps (they hit https://jimi-api.julsql.fr/chat directly).
#
# Install:
#   sudo cp jimi-api.julsql.fr.conf /etc/nginx/conf.d/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d jimi-api.julsql.fr
#
# Certbot rewrites this file in place to add the SSL listen / cert lines
# and the HTTP→HTTPS redirect.

server {
    listen 80;
    server_name jimi-api.julsql.fr;

    # LLM calls can be slow — give them room.
    client_max_body_size      10m;
    proxy_connect_timeout     30s;
    proxy_send_timeout        60s;
    proxy_read_timeout        120s;
    proxy_buffering           off;
    proxy_request_buffering   off;

    # CORS is handled inside the Spring Boot API. Native iOS/Android apps
    # don't enforce CORS, only the web frontend at jimi.julsql.fr does.

    location / {
        proxy_pass http://127.0.0.1:8102;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_log  /var/log/nginx/jimi-api_error.log;
    access_log /var/log/nginx/jimi-api_access.log;
}
