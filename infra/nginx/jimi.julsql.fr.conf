# JIMI web app — reverse-proxy onto the docker container bound on 127.0.0.1.
#
# Install:
#   sudo cp jimi.julsql.fr.conf /etc/nginx/conf.d/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d jimi.julsql.fr
#
# Certbot rewrites this file in place to add `listen 443 ssl;`,
# `ssl_certificate …`, the HTTP→HTTPS redirect, etc. Don't edit those
# `# managed by Certbot` lines by hand.

server {
    listen 80;
    server_name jimi.julsql.fr;

    location / {
        proxy_pass http://127.0.0.1:8101;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_log  /var/log/nginx/jimi_error.log;
    access_log /var/log/nginx/jimi_access.log;
}
