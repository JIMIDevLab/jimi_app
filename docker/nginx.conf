# Nginx config for the JIMI web app container.
# This is the *inner* nginx that serves the static Expo Web export. It sits
# behind the outer reverse-proxy nginx that handles TLS and vhosts.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Useful real-IP info forwarded by the outer proxy.
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    # Gzip text-like assets.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # Aggressive cache for fingerprinted static assets.
    location ~* \.(?:js|css|woff|woff2|ttf|otf|eot|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Don't cache HTML — must always reflect the latest build.
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # Health endpoint used by the container HEALTHCHECK + compose probes.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Expo Router with output: "static" produces /home/index.html etc.
    # The fallback chain handles bare paths, .html, directories and SPA.
    location / {
        try_files $uri $uri.html $uri/index.html /index.html;
    }
}
